<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Playfair+Display:ital,wght@0,700;0,900;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --accent: #C9A84C;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px;
  height: 1080px;
  overflow: hidden;
  font-family: 'Inter', sans-serif;
  background: #0B0F1A;
}

.container {
  width: 1080px;
  height: 1080px;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Subtle texture background */
.container::before {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    135deg, transparent, transparent 60px,
    rgba(201,168,76,0.015) 60px, rgba(201,168,76,0.015) 62px
  );
}

/* Accent sidebar */
.accent-sidebar {
  position: absolute;
  left: 0;
  top: 120px;
  bottom: 120px;
  width: 6px;
  background: linear-gradient(180deg, transparent, var(--accent), transparent);
}

/* Campaign label */
.campaign-label {
  position: absolute;
  top: 48px;
  left: 72px;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--accent);
  opacity: 0.8;
}

/* Main text */
.slide-text {
  padding: 80px 100px;
  text-align: center;
}

.slide-text .main-text {
  font-family: 'Playfair Display', serif;
  font-size: 56px;
  font-weight: 900;
  line-height: 1.2;
  color: #FAFAF8;
  letter-spacing: -1px;
  margin-bottom: 32px;
}

.slide-text .sub-text {
  font-size: 26px;
  font-weight: 400;
  line-height: 1.6;
  color: rgba(250,250,248,0.65);
  max-width: 750px;
  margin: 0 auto;
}

/* Quote marks */
.quote-mark {
  font-family: 'Playfair Display', serif;
  font-size: 160px;
  font-weight: 900;
  color: var(--accent);
  opacity: 0.12;
  position: absolute;
  line-height: 1;
}
.quote-mark.open { top: 60px; left: 60px; }
.quote-mark.close { bottom: 20px; right: 60px; transform: rotate(180deg); }

/* Slide indicator */
.slide-indicator {
  position: absolute;
  bottom: 48px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 10px;
}
.slide-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: rgba(250,250,248,0.15);
}
.slide-dot.active {
  background: var(--accent);
  width: 28px;
  border-radius: 5px;
}

/* AUROS watermark */
.watermark {
  position: absolute;
  bottom: 48px;
  right: 48px;
  font-size: 12px;
  font-weight: 800;
  letter-spacing: 4px;
  color: rgba(201,168,76,0.25);
}
</style>
</head>
<body>
<div class="container">
  <div class="accent-sidebar"></div>
  <div class="campaign-label" id="campaign-label"></div>
  <span class="quote-mark open">"</span>
  <span class="quote-mark close">"</span>
  <div class="slide-text">
    <div class="main-text" id="main-text"></div>
    <div class="sub-text" id="sub-text"></div>
  </div>
  <div class="slide-indicator" id="slide-indicator"></div>
  <div class="watermark">AUROS</div>
</div>
</body>
</html>
