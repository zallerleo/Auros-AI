<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Playfair+Display:ital,wght@0,700;0,900;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --accent: #C9A84C;
  --accent-bg: rgba(201,168,76,0.15);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px;
  height: 1080px;
  overflow: hidden;
  font-family: 'Inter', sans-serif;
  background: #0B0F1A;
}

.container {
  width: 1080px;
  height: 1080px;
  position: relative;
  overflow: hidden;
}

/* Background image */
.bg-image {
  position: absolute;
  inset: 0;
  background-size: cover;
  background-position: center;
  z-index: 1;
}

/* Gradient overlay */
.gradient-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(
    180deg,
    rgba(11,15,26,0.1) 0%,
    rgba(11,15,26,0.3) 35%,
    rgba(11,15,26,0.85) 65%,
    rgba(11,15,26,0.95) 100%
  );
  z-index: 2;
}

/* Accent bar at top */
.accent-bar {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 6px;
  background: linear-gradient(90deg, var(--accent), transparent);
  z-index: 10;
}

/* Content area */
.content {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 60px 64px;
  z-index: 5;
}

/* Hook text */
.hook {
  font-family: 'Playfair Display', serif;
  font-size: 52px;
  font-weight: 900;
  line-height: 1.15;
  color: #FAFAF8;
  margin-bottom: 24px;
  letter-spacing: -1px;
  text-shadow: 0 2px 20px rgba(0,0,0,0.5);
}

/* Body text */
.body-text {
  font-size: 24px;
  font-weight: 400;
  line-height: 1.5;
  color: rgba(250,250,248,0.8);
  margin-bottom: 28px;
  max-width: 800px;
}

/* CTA */
.cta {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  padding: 16px 32px;
  background: var(--accent);
  color: #0B0F1A;
  font-size: 18px;
  font-weight: 800;
  letter-spacing: 1px;
  text-transform: uppercase;
  border-radius: 8px;
}

/* Campaign label */
.campaign-label {
  position: absolute;
  top: 36px;
  left: 64px;
  z-index: 10;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--accent);
  opacity: 0.9;
}

/* AUROS watermark */
.watermark {
  position: absolute;
  bottom: 24px;
  right: 32px;
  z-index: 10;
  font-size: 12px;
  font-weight: 800;
  letter-spacing: 4px;
  color: rgba(201,168,76,0.3);
}
</style>
</head>
<body>
<div class="container">
  <div class="accent-bar"></div>
  <div class="campaign-label" id="campaign-label"></div>
  <div class="bg-image" id="bg-image"></div>
  <div class="gradient-overlay"></div>
  <div class="content">
    <div class="hook" id="hook"></div>
    <div class="body-text" id="body-text"></div>
    <div class="cta" id="cta"></div>
  </div>
  <div class="watermark">AUROS</div>
</div>
</body>
</html>
