<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Playfair+Display:ital,wght@0,700;0,900;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --accent: #C9A84C;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px;
  height: 1920px;
  overflow: hidden;
  font-family: 'Inter', sans-serif;
  background: #0B0F1A;
}

.container {
  width: 1080px;
  height: 1920px;
  position: relative;
  overflow: hidden;
}

.bg-image {
  position: absolute;
  inset: 0;
  background-size: cover;
  background-position: center;
  z-index: 1;
}

.gradient-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(
    180deg,
    rgba(11,15,26,0.05) 0%,
    rgba(11,15,26,0.15) 30%,
    rgba(11,15,26,0.7) 60%,
    rgba(11,15,26,0.95) 85%,
    rgba(11,15,26,1) 100%
  );
  z-index: 2;
}

.accent-bar {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 6px;
  background: linear-gradient(90deg, var(--accent), transparent);
  z-index: 10;
}

.campaign-label {
  position: absolute;
  top: 64px;
  left: 72px;
  z-index: 10;
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 5px;
  text-transform: uppercase;
  color: var(--accent);
}

.content {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 80px 72px 160px;
  z-index: 5;
}

.hook {
  font-family: 'Playfair Display', serif;
  font-size: 64px;
  font-weight: 900;
  line-height: 1.12;
  color: #FAFAF8;
  margin-bottom: 32px;
  letter-spacing: -1.5px;
  text-shadow: 0 4px 30px rgba(0,0,0,0.6);
}

.body-text {
  font-size: 28px;
  font-weight: 400;
  line-height: 1.5;
  color: rgba(250,250,248,0.75);
  margin-bottom: 40px;
}

.cta-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
}

.cta {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  padding: 20px 48px;
  background: var(--accent);
  color: #0B0F1A;
  font-size: 20px;
  font-weight: 800;
  letter-spacing: 2px;
  text-transform: uppercase;
  border-radius: 10px;
}

.swipe-indicator {
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: rgba(250,250,248,0.4);
  margin-top: 12px;
}

.swipe-arrow {
  width: 40px;
  height: 40px;
  border-left: 2px solid rgba(250,250,248,0.3);
  border-bottom: 2px solid rgba(250,250,248,0.3);
  transform: rotate(-45deg);
  margin: 0 auto;
}

.watermark {
  position: absolute;
  bottom: 40px;
  right: 48px;
  z-index: 10;
  font-size: 14px;
  font-weight: 800;
  letter-spacing: 5px;
  color: rgba(201,168,76,0.25);
}
</style>
</head>
<body>
<div class="container">
  <div class="accent-bar"></div>
  <div class="campaign-label" id="campaign-label"></div>
  <div class="bg-image" id="bg-image"></div>
  <div class="gradient-overlay"></div>
  <div class="content">
    <div class="hook" id="hook"></div>
    <div class="body-text" id="body-text"></div>
    <div class="cta-container">
      <div class="cta" id="cta"></div>
      <div class="swipe-arrow"></div>
      <div class="swipe-indicator">Swipe Up</div>
    </div>
  </div>
  <div class="watermark">AUROS</div>
</div>
</body>
</html>
