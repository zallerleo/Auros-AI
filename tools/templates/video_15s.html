<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Playfair+Display:ital,wght@0,700;0,900;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --accent: #C9A84C;
  --accent-bg: rgba(201,168,76,0.15);
  --total-duration: 15s;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px;
  height: 1920px;
  overflow: hidden;
  font-family: 'Inter', sans-serif;
  background: #0B0F1A;
}

.video-container {
  width: 1080px;
  height: 1920px;
  position: relative;
  overflow: hidden;
}

/* ====== SCENES ====== */
.scene {
  position: absolute;
  inset: 0;
  opacity: 0;
}

.scene .bg {
  position: absolute;
  inset: -40px;
  background-size: cover;
  background-position: center;
}

.scene .overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(
    180deg,
    rgba(11,15,26,0.3) 0%,
    rgba(11,15,26,0.1) 30%,
    rgba(11,15,26,0.5) 60%,
    rgba(11,15,26,0.9) 85%
  );
}

.scene .text-container {
  position: absolute;
  bottom: 200px;
  left: 72px;
  right: 72px;
  z-index: 5;
}

.scene .text-overlay {
  font-family: 'Playfair Display', serif;
  font-size: 72px;
  font-weight: 900;
  line-height: 1.1;
  color: #FAFAF8;
  letter-spacing: -1.5px;
  text-shadow: 0 4px 40px rgba(0,0,0,0.7);
  opacity: 0;
}

/* ====== CTA SCENE ====== */
.cta-scene {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: #0B0F1A;
  opacity: 0;
  z-index: 10;
}

.cta-scene .cta-text {
  font-family: 'Playfair Display', serif;
  font-size: 56px;
  font-weight: 900;
  color: #FAFAF8;
  text-align: center;
  margin-bottom: 40px;
  max-width: 800px;
}

.cta-scene .cta-button {
  padding: 24px 64px;
  background: var(--accent);
  color: #0B0F1A;
  font-size: 22px;
  font-weight: 800;
  letter-spacing: 3px;
  text-transform: uppercase;
  border-radius: 12px;
  opacity: 0;
}

.cta-scene .brand {
  position: absolute;
  bottom: 80px;
  font-size: 16px;
  font-weight: 800;
  letter-spacing: 6px;
  color: var(--accent);
  opacity: 0.6;
}

/* ====== ACCENT BAR ====== */
.accent-bar {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 6px;
  background: linear-gradient(90deg, var(--accent), transparent);
  z-index: 20;
}

/* ====== PROGRESS BAR ====== */
.progress-bar {
  position: absolute;
  bottom: 0;
  left: 0;
  height: 4px;
  background: var(--accent);
  z-index: 20;
  width: 0%;
}

/* ====== ANIMATIONS ====== */
/* Ken Burns - slow zoom in */
@keyframes kenBurnsIn {
  from { transform: scale(1); }
  to { transform: scale(1.15); }
}

/* Ken Burns - slow zoom out */
@keyframes kenBurnsOut {
  from { transform: scale(1.15); }
  to { transform: scale(1); }
}

/* Ken Burns - pan right */
@keyframes kenBurnsPanRight {
  from { transform: scale(1.1) translateX(-2%); }
  to { transform: scale(1.1) translateX(2%); }
}

/* Text fade in up */
@keyframes textFadeInUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Scene fade */
@keyframes sceneFadeIn {
  0% { opacity: 0; }
  5% { opacity: 1; }
  95% { opacity: 1; }
  100% { opacity: 0; }
}

/* CTA fade in */
@keyframes ctaFadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

/* CTA button slide up */
@keyframes ctaButtonIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Progress bar */
@keyframes progressFill {
  from { width: 0%; }
  to { width: 100%; }
}

.progress-bar {
  animation: progressFill var(--total-duration) linear forwards;
}
</style>
</head>
<body>
<div class="video-container">
  <div class="accent-bar"></div>

  <!-- Scenes will be injected by JS -->
  <div id="scenes-container"></div>

  <!-- CTA final scene -->
  <div class="cta-scene" id="cta-scene">
    <div class="cta-text" id="cta-text"></div>
    <div class="cta-button" id="cta-button">Get Tickets</div>
    <div class="brand">AUROS</div>
  </div>

  <div class="progress-bar"></div>
</div>
</body>
</html>
